AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IAM role with full access to an S3 bucket

Parameters:
  BucketName:
    Type: String
    Default: nwofor-936-iam
    Description: Name of the S3 bucket to grant access to

Resources:
  # Create the S3 bucket
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "${BucketName}-bucket"
        - Key: Environment
          Value: Development

  # Create IAM Role
  MyIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${BucketName}-full-access-role"
      Description: Role with full access to S3 bucket nwofor-936-iam
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::492534223967:user/sts-machine-user
              Service: 
                - ec2.amazonaws.com
                - lambda.amazonaws.com
                - s3.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: !Sub "${BucketName}-role"
        - Key: Environment
          Value: Development

  # IAM Policy with Full S3 Bucket Access
  S3FullAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${BucketName}-full-access-policy"
      Roles:
        - !Ref MyIAMRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
            Resource: "arn:aws:s3:::*"
          
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:GetObjectVersion
              - s3:DeleteObjectVersion
              - s3:PutObjectVersion
              - s3:GetObjectAcl
              - s3:PutObjectAcl
              - s3:GetObjectTagging
              - s3:PutObjectTagging
              - s3:DeleteObjectTagging
              - s3:RestoreObject
            Resource: !Sub "${MyS3Bucket.Arn}/*"

  # Optional: Instance Profile (if using with EC2)
  MyInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${BucketName}-instance-profile"
      Roles:
        - !Ref MyIAMRole

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref MyS3Bucket
  
  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt MyS3Bucket.Arn
  
  IAMRoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt MyIAMRole.Arn
  
  IAMRoleName:
    Description: Name of the created IAM role
    Value: !Ref MyIAMRole
  
  InstanceProfileArn:
    Description: ARN of the instance profile (for EC2)
    Value: !GetAtt MyInstanceProfile.Arn
  
  InstanceProfileName:
    Description: Name of the instance profile
    Value: !Ref MyInstanceProfile